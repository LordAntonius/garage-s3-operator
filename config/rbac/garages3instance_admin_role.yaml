# This rule is not used by the project garage-s3-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over garage.s3operator.fr.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: garage-s3-operator
    app.kubernetes.io/managed-by: kustomize
  name: garages3instance-admin-role
rules:
- apiGroups:
  - garage.s3operator.fr
  resources:
  - garages3instances
  verbs:
  - '*'
- apiGroups:
  - garage.s3operator.fr
  resources:
  - garages3instances/status
  verbs:
  - get
