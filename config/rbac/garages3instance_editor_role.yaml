# This rule is not used by the project garage-s3-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the garage.s3operator.fr.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: garage-s3-operator
    app.kubernetes.io/managed-by: kustomize
  name: garages3instance-editor-role
rules:
- apiGroups:
  - garage.s3operator.fr
  resources:
  - garages3instances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - garage.s3operator.fr
  resources:
  - garages3instances/status
  verbs:
  - get
