---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - garage.s3operator.fr
  resources:
  - garages3instances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - garage.s3operator.fr
  resources:
  - garages3instances/finalizers
  verbs:
  - update
- apiGroups:
  - garage.s3operator.fr
  resources:
  - garages3instances/status
  verbs:
  - get
  - patch
  - update
